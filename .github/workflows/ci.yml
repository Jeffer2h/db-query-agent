# CI — runs the test suite on every push and pull request to main.
#
# Notes:
# - Tests are hermetic (all API calls mocked) — no secrets needed here.
# - `uv sync --frozen` installs exactly what uv.lock pins (fails if the lock
#   is out of date instead of silently re-resolving) and skips optional extras.
# - The dev dependency group (pytest) IS installed by default by `uv sync`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Four agent tests hit a real SQLite DB (no mocks, by design). The
      # compiled ecommerce.db is gitignored, so build it from the tracked
      # data/seed.sql before running the suite.
      - name: Seed demo database
        run: uv run python -m src.seed

      - name: Run tests
        run: uv run pytest
